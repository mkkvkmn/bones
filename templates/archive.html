<!-- templates/archive.html -->
{% extends "base.html" %}

{% block archive_css %}
    <link rel="stylesheet" href="/{{ meta['site']['assets']['dir_css'] }}/archive.css">
{% endblock %}

{% block content %}
<h2>Archivesss</h2>
<ul>
    {% for post in meta['posts'] %}
    <li>
        <a class="no-decoration" href="{{ post.url }}">{{ post.title }}</a> - {{ post.date }}
    </li>
    {% endfor %}
</ul>
{% endblock %}
